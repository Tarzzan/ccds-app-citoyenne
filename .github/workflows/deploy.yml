name: Deploy — Production

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-22.04
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader --working-dir=backend

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            backend/ \
            admin/ \
            docs/api/ \
            --exclude="backend/vendor/phpunit" \
            --exclude="backend/vendor/php-cs-fixer" \
            --exclude="*.test.php"

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp/"

      - name: Run post-deploy commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /var/www/ccds
            tar -xzf /tmp/deploy.tar.gz --overwrite
            cd backend && vendor/bin/phinx migrate -e production
            php artisan cache:clear 2>/dev/null || true
            echo "✅ Déploiement v${{ github.ref_name }} terminé"

      - name: Notify on success
        if: success()
        run: echo "🚀 Déploiement ${{ github.ref_name }} réussi en production"
