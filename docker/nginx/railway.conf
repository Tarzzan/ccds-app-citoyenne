server {
    listen 80;
    server_name _;

    root /var/www;
    index index.php;

    # ── Sécurité ─────────────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── API Backend ───────────────────────────────────────────────────────────
    location /api/ {
        try_files $uri $uri/ /backend/index.php?$query_string;
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME /var/www/backend/index.php;
            include        fastcgi_params;
        }
    }

    # ── Uploads (fichiers statiques) ──────────────────────────────────────────
    location /uploads/ {
        alias /var/www/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Back-Office Admin ─────────────────────────────────────────────────────
    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
        location ~ \.php$ {
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME /var/www$fastcgi_script_name;
            include        fastcgi_params;
        }
    }

    # ── Page de statut ────────────────────────────────────────────────────────
    location /status {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_param  SCRIPT_FILENAME /var/www/backend/status.php;
        include        fastcgi_params;
    }

    # ── Racine → redirection vers admin ──────────────────────────────────────
    location = / {
        return 302 /admin/;
    }

    # ── Bloquer les fichiers sensibles ────────────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
    }

    location ~ /(vendor|tests|docker)/ {
        deny all;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
